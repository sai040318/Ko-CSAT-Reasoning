# Qwen3-2507 Thinking 모델 설정 (Ollama 기반)
mode: inference
seed: 42
exp_name: qwen3-2507-thinking

# 로깅 설정
logging:
  # 레벨: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: DEBUG
  # 색상 사용 여부
  use_color: true

# Hydra 설정
hydra:
  output_subdir: null
  job:
    chdir: false
  # Hydra 기본 로깅 비활성화 (get_logger만 사용)
  job_logging:
    disable_existing_loggers: false
    root:
      handlers: []
  hydra_logging:
    disable_existing_loggers: false
    root:
      handlers: []

# TODO 이상하면 고칠 것
# 데이터셋 설정 (Ollama 전용 - 토큰화 없음)
dataset:
  type: qwen3-ollama
  path: data/train.csv

  # 전처리 옵션 (Ollama는 대부분 무시)
  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false
    inference:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false

# 프롬프트 템플릿 설정
prompt:
  # 사용 가능한 템플릿:
  # - qwen3_2507_thinking: 기본 템플릿 (숫자만 출력)
  # - qwen3_cot: Chain of Thought 스타일
  # - qwen3_expert: 전문가 역할 부여
  # - qwen3_structured: JSON 구조화 출력용
  name: qwen3_2507_thinking

# 모델 설정 (Ollama)
model:
  type: qwen3-ollama
  model_name_or_path: unsloth/Qwen3-30B-A3B-Thinking-2507-GGUF  # Ollama는 inference.ollama.model 사용
  # 더미 값 (run.py 호환용, Ollama에서는 무시됨)
  max_seq_length: 32768

# 추론 설정
inference:
  test_dataset_path: data/test.csv
  output_path: output/qwen3_2507_thinking

  # Ollama 설정
  # https://github.com/ollama/ollama/blob/main/docs/modelfile.mdx#valid-parameters-and-values
  ollama:
    # 사용할 Ollama 모델명
    model: "hf.co/unsloth/Qwen3-30B-A3B-Thinking-2507-GGUF:UD-Q4_K_XL"

    # Thinking 모드 (내부 추론 과정 활성화)
    # num_ctx, seed, min_p, num_predict
    think: true

    # Structured Output 사용 (1-5만 출력하도록 강제)
    use_structured: true
    # 생성 파라미터
    temperature: 0.6
    top_p: 0.95
    top_k: 20
