# Qwen3-2507 Ollama Instruct 모델 설정
# Base 설정을 상속하고 Instruct 모델에 최적화된 값으로 오버라이드

# hydra 설정
defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null

# 로깅 설정
logging:
  level: DEBUG
  tune_third_party: true
  use_color: true


################################################################
######################## 실험 설정 ##############################
################################################################

mode: inference
seed: 42
exp_name: qwen3-2507-ollama-instruct

# 데이터셋 설정
dataset:
  type: ollama
  path: data/train.csv

  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false
    inference:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false

# 모델 설정 (Instruct)
model:
  type: qwen3-2507_ollama
  variant: instruct
  model_name_or_path: "hf.co/unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF:UD-Q4_K_XL"

# Ollama 설정 (Instruct 최적화)
ollama:
  think: false
  use_structured: true

  options:
    # Instruct 모델은 3k+ 면 충분
    num_ctx: 4096
    num_predict: -1

    # Qwen3-2507 Instruct 권장값
    # https://unsloth.ai/docs/models/qwen3-how-to-run-and-fine-tune/qwen3-2507
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    presence_penalty: 0.0  # 0.0 ~ 2.0

    seed: 42

# 프롬프트 템플릿 설정
prompt:
  name: qwen3_2507_base

# 추론 설정
inference:
  test_dataset_path: data/test.csv
  output_path: outputs
