# Qwen3-2507 Ollama 통합 모델 설정 (Base Template)
# 이 파일을 기본으로 thinking/instruct 설정을 오버라이드하여 사용

# hydra 설정
defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null

# 로깅 설정
logging:
  level: DEBUG  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  tune_third_party: true
  use_color: true


################################################################
######################## 실험 설정 ##############################
################################################################

mode: inference
seed: 42
exp_name: qwen3-2507-ollama-base

# 데이터셋 설정 (Ollama 전용 - 토큰화 없음)
dataset:
  type: ollama
  path: data/train.csv

  # 전처리 옵션 (Ollama는 대부분 무시)
  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false
    inference:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false

# 모델 설정
model:
  type: Qwen3-2507_ollama

  # variant: 모델 종류 구분 (thinking / instruct)
  # - 코드 로직에서 모델별 기본값 적용에 사용
  # - thinking 모델: Qwen3-30B-A3B-Thinking-2507
  # - instruct 모델: Qwen3-30B-A3B-Instruct-2507
  variant: instruct

  # Ollama 모델명 (model_name_or_path로도 사용됨)
  model_name_or_path: "hf.co/unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF:UD-Q4_K_XL"

# Ollama 설정
ollama:
  # model: ollama.model이 있으면 이 값 사용, 없으면 model.model_name_or_path 사용
  # model: "hf.co/unsloth/Qwen3-30B-A3B-Instruct-2507-GGUF:UD-Q4_K_XL"

  # think: thinking 기능 활성화 여부
  # - thinking 모델에서도 false로 설정 가능 (추론 과정 없이 바로 답변)
  # - instruct 모델에서는 일반적으로 false
  think: false

  # Structured Output 사용 (1-5만 출력하도록 강제)
  # [참고] GBNF grammar + logit masking으로 {"answer": 1~5} 형태만 출력
  use_structured: true

  # https://github.com/ollama/ollama/blob/main/docs/modelfile.mdx#valid-parameters-and-values
  # 생성 파라미터 (options)
  options:
    # === 컨텍스트 설정 ===
    # Instruct: 4096 충분 (지문 3k 이상이면 잘리지 않음)
    # Thinking: 65536 권장 (V100 32GB VRAM 최대 활용)
    num_ctx: 40000

    # === num_predict 설정 가이드 ===
    # [조사 결과 - 2025.01]
    # Ollama Structured Output은 GBNF grammar + logit masking 사용
    # - llama.cpp의 GBNF grammar 기능으로 출력 제약
    # - 유효하지 않은 토큰의 logit을 -INFINITY로 설정하여 샘플링에서 제외
    # - 모델은 masking 존재를 인식하지 못함
    # - JSON schema → GBNF grammar 자동 변환 (Ollama v0.5+)
    #
    # [불명확한 사항]
    # - thinking 토큰이 num_predict에 포함되는지 공식 문서에 미명시
    # - eval_count는 "응답의 토큰 수"로만 정의 (thinking 포함 여부 불명)
    #
    # [권장]
    # - MCQA + structured output: 짧은 값도 충분할 수 있음 ({"answer": 1~5})
    # - thinking 모드: 충분히 큰 값 필요 (추론 과정이 길어질 수 있음)
    #
    # [실험 필요]
    # - thinking 모드에서 num_predict가 thinking+content 합인지 확인
    # - 너무 작으면 thinking이 중간에 끊길 수 있음
    num_predict: -1  # -1: 무제한

    # === Qwen3-2507 Best Practices (Unsloth 권장값) ===
    # https://unsloth.ai/docs/models/qwen3-how-to-run-and-fine-tune/qwen3-2507
    #
    # | 파라미터    | Instruct | Thinking |
    # |------------|----------|----------|
    # | temperature| 0.7      | 0.6      |
    # | top_p      | 0.8      | 0.95     |
    # | top_k      | 20       | 20       |
    # | min_p      | 0.0      | 0.0      |
    #
    # presence_penalty: 0.0~2.0 (반복 줄이기, 기본 off)
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    # presence_penalty: 0.0  # 0.0 ~ 2.0

    # === 추가 옵션 (실험용, 필요시 REQUIRED_OPTIONS에 추가) ===
    # repeat_penalty: 1.1    # 기본값 1.1, 필요시 조정
    # repeat_last_n: 64      # 반복 체크 범위

    seed: 42

# 프롬프트 템플릿 설정
prompt:
  # 사용 가능한 템플릿:
  # - qwen3_2507_base: 기본 템플릿 (숫자만 출력)
  # - qwen3_cot: Chain of Thought 스타일
  # - qwen3_expert: 전문가 역할 부여
  # - qwen3_structured: JSON 구조화 출력용
  name: qwen3_2507_base

# 추론 설정
inference:
  test_dataset_path: data/test.csv
  output_path: outputs
