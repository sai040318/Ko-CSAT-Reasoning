# Qwen3-2507 Thinking 모델 설정 (Ollama 기반)

# hydra 설정
defaults:
  - _self_
  - override hydra/hydra_logging: none
  - override hydra/job_logging: none

hydra:
  job:
    chdir: false
  
  run:
    dir: .
  output_subdir: null

# 로깅 설정
logging:
  level: DEBUG # 레벨: DEBUG, INFO, WARNING, ERROR, CRITICAL
  tune_third_party: true # 서드파티 라이브러리 로깅 조정 여부
  use_color: true # 색상 사용 여부


################################################################
######################## 실험 설정 ##############################
################################################################

mode: inference
seed: 42
exp_name: qwen3-2507-thinking

# 데이터셋 설정 (Ollama 전용 - 토큰화 없음)
dataset:
  type: ollama
  path: data/train.csv

  # 전처리 옵션 (Ollama는 대부분 무시)
  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false
    inference:
      add_generation_prompt: false
      filter_over_length: false
      truncation: false

# ollama 설정
ollama:
  # 사용할 Ollama 모델명
  model: "hf.co/unsloth/Qwen3-30B-A3B-Thinking-2507-GGUF:UD-Q4_K_XL"
  # Thinking 모드 (내부 추론 과정 활성화)
  # num_ctx, seed, min_p, num_predict
  think: true
  # Structured Output 사용 (1-5만 출력하도록 강제)
  use_structured: true
  # 생성 파라미터
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0.0
  presence_penalty: 0.0 # 0.0 ~ 2.0
  seed: 42

# 프롬프트 템플릿 설정
prompt:
  # 사용 가능한 템플릿:
  # - qwen3_2507_thinking: 기본 템플릿 (숫자만 출력)
  # - qwen3_cot: Chain of Thought 스타일
  # - qwen3_expert: 전문가 역할 부여
  # - qwen3_structured: JSON 구조화 출력용
  name: qwen3_2507_base

# 모델 설정 (Ollama)
model:
  type: qwen3-ollama-thinking

# 추론 설정
inference:
  test_dataset_path: data/test.csv
  output_path: outputs

  # Ollama 설정
  # https://github.com/ollama/ollama/blob/main/docs/modelfile.mdx#valid-parameters-and-values
