mode: evaluate # run.py는 eval이 아니라 evaluate를 사용합니다.
seed: 42
exp_name: llama8b_eval

hydra:
  output_subdir: null
  job:
    chdir: false

dataset:
  type: baseline
  path: data/eval.csv
  split_ratio: 0.8

  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: true
      truncation: true
    inference:
      add_generation_prompt: true
      filter_over_length: false
      truncation: true
    evaluate:
      add_generation_prompt: true
      filter_over_length: false
      truncation: true
      exclude_answer_from_prompt: true

prompt:
  name: base

model:
  type: unsloth
  model_name_or_path: "unsloth/Meta-Llama-3.1-8B-Instruct-bnb-4bit"
  use_peft: true
  max_seq_length: 4096
  load_in_4bit: true

  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_bias: "none"

training:
  output_dir: output/llama8b
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 1
  save_strategy: "epoch"
  eval_strategy: "no"
  save_total_limit: 2
  save_only_model: true
  fp16: true
  bf16: false
  packing: true
  report_to: "none"

inference:
  max_new_tokens: 1
  batch_size: 1
  test_dataset_path: data/test.csv
  model_load_path: output/llama8b
  output_path: output/llama8b_output.csv

evaluate:
  model_load_path: output/llama8b
  eval_output_path: output/llama8b_eval_results.csv

rag:
  use: false
  top_k: 3
  bm25_k: 10
  vec_k: 10
  weight_bm25: 0.7
  weight_vec: 0.3
