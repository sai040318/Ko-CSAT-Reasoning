# 기본 설정
mode: train # train, inference, evaluate
seed: 42
exp_name: unsloth_qwen2.5_32b_exp

# Hydra 설정
hydra:
  output_subdir: null
  job:
    chdir: false

# 데이터셋 설정
dataset:
  type: baseline
  path: data/train.csv
  split_ratio: 0.8  
  
  # 전처리 옵션
  preprocess:
    train:
      add_generation_prompt: false
      filter_over_length: true
      truncation: true
    inference:
      add_generation_prompt: true
      filter_over_length: false
      truncation: true

# 프롬프트 탬플릿(txt) 설정
prompt:
  name: base

# 모델 설정 (Unsloth)
model:
  type: unsloth 
  model_name_or_path: "unsloth/Qwen2.5-32B-Instruct-bnb-4bit"
  use_peft: true
  max_seq_length: 4096 # 32B 모델은 메모리 고려하여 4096으로 설정
  load_in_4bit: true   # Unsloth 4bit 로드
  
  # LoRA 설정 (32B 모델 최적화)
  lora_r: 32           # 큰 모델은 더 높은 rank 활용 가능
  lora_alpha: 32       # r과 동일하게 설정
  lora_dropout: 0      # Unsloth은 0 권장
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_bias: "none"

# 학습 설정 (32B 모델 최적화)
training:
  output_dir: output/unsloth_qwen2.5_32b
  num_train_epochs: 1
  max_steps: 10
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 1
  save_strategy: "no"
  eval_strategy: "no"
  save_total_limit: 1
  save_only_model: true
  fp16: true
  bf16: false
  packing: true        # Unsloth packing으로 효율성 향상
  report_to: "none"    # wandb 사용 시 "wandb"로 변경

# 추론 설정
inference:
  max_new_tokens: 1
  batch_size: 1        # 추론도 배치 1로 안정성 확보
  test_dataset_path: data/test.csv
  model_load_path: output/unsloth_qwen2.5_32b
  output_path: output/qwen2.5_32b_output_1.csv

# 평가 설정
evaluate:
  model_load_path: output/unsloth_qwen2.5_32b
  eval_output_path: output/qwen2.5_shuffle_self_eval_results.csv

# RAG 설정
rag:
  use: false  #(Rag 사용시 true로 변경)
  top_k: 3
  bm25_k: 10
  vec_k: 10
  weight_bm25: 0.7
  weight_vec: 0.3
